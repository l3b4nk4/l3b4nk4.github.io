<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Shell Access Cover</title>
  <desc id="desc">Terminal-style cover with command output and access indicators.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071014"/>
      <stop offset="100%" stop-color="#111a20"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1ee0d2"/>
      <stop offset="100%" stop-color="#0aa39a"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="210" r="210" fill="#17cdbc" opacity="0.12" filter="url(#blur)"/>

  <rect x="120" y="120" width="1360" height="660" rx="28" fill="#0b1217" stroke="#244149" stroke-width="2"/>
  <rect x="120" y="120" width="1360" height="74" rx="28" fill="#111b21"/>
  <rect x="120" y="166" width="1360" height="28" fill="#111b21"/>

  <circle cx="172" cy="157" r="10" fill="#ff6b6b"/>
  <circle cx="208" cy="157" r="10" fill="#ffc857"/>
  <circle cx="244" cy="157" r="10" fill="#2dd4bf"/>

  <g font-family="'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace">
    <text x="300" y="165" font-size="28" fill="#b9d9d5" opacity="0.82">operator@lab: shell-access</text>

    <text x="185" y="270" font-size="30" fill="#2ce3d3">$ ssh user@10.10.10.10</text>
    <text x="185" y="322" font-size="28" fill="#8fc9c2">user@10.10.10.10's password: ********</text>
    <text x="185" y="398" font-size="28" fill="#8fc9c2">Linux labbox 6.6.0 x86_64 GNU/Linux</text>
    <text x="185" y="450" font-size="28" fill="#8fc9c2">uid=1001(user) gid=1001(user) groups=1001(user)</text>
    <text x="185" y="526" font-size="30" fill="#2ce3d3">$ python3 -c 'import pty; pty.spawn("/bin/bash")'</text>
    <text x="185" y="578" font-size="28" fill="#8fc9c2">bash-5.2$ export TERM=xterm</text>
    <text x="185" y="630" font-size="28" fill="#8fc9c2">bash-5.2$ stty rows 40 cols 140</text>
    <text x="185" y="706" font-size="92" font-weight="700" fill="#d8fffb">SHELL</text>
    <text x="585" y="706" font-size="92" font-weight="700" fill="#2ce3d3">ACCESS</text>
    <text x="190" y="752" font-size="24" fill="#8fc9c2">stabilize the foothold / keep the session usable</text>
  </g>

  <rect x="1105" y="610" width="220" height="14" rx="7" fill="url(#bar)"/>
  <rect x="1105" y="648" width="155" height="14" rx="7" fill="#36505a"/>
  <rect x="1105" y="686" width="185" height="14" rx="7" fill="#36505a"/>
</svg>
